openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Keto Diet Doctor Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: dashboard
    description: Doctor dashboard stats
  - name: kids
    description: Kid management
  - name: foods
    description: Food management
  - name: notes
    description: Private notes
  - name: mealplans
    description: Library meal plan management and assignment
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: doctorLogin
      tags: [auth]
      summary: Doctor login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: doctorLogout
      tags: [auth]
      summary: Doctor logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current logged in doctor
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /kids:
    get:
      operationId: getKids
      tags: [kids]
      summary: Get all kids with optional search and filter
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by name, kid ID, parent name
        - name: phase
          in: query
          schema:
            type: integer
            enum: [1, 2, 3, 4]
          description: Filter by phase
        - name: highRisk
          in: query
          schema:
            type: boolean
          description: Filter high-risk children only
      responses:
        "200":
          description: List of kids
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Kid"

    post:
      operationId: createKid
      tags: [kids]
      summary: Create a new kid profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKidRequest"
      responses:
        "201":
          description: Kid created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kid"

  /kids/{kidId}:
    get:
      operationId: getKid
      tags: [kids]
      summary: Get kid profile
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Kid profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KidProfile"
        "404":
          description: Kid not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateKid
      tags: [kids]
      summary: Update kid information
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKidRequest"
      responses:
        "200":
          description: Kid updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kid"

    delete:
      operationId: deleteKid
      tags: [kids]
      summary: Delete a kid and all associated data
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Kid deleted
        "404":
          description: Kid not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kids/{kidId}/weight:
    post:
      operationId: addWeightRecord
      tags: [kids]
      summary: Add weight record for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeightRecordRequest"
      responses:
        "201":
          description: Weight record added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightRecord"

    get:
      operationId: getWeightHistory
      tags: [kids]
      summary: Get weight history for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Weight history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeightRecord"

  /kids/{kidId}/medical:
    get:
      operationId: getKidMedical
      tags: [kids]
      summary: Get kid medical settings
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Medical settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalSettings"

    put:
      operationId: updateKidMedical
      tags: [kids]
      summary: Update kid medical settings
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicalSettingsRequest"
      responses:
        "200":
          description: Medical settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalSettings"

  /kids/{kidId}/meal-history:
    get:
      operationId: getKidMealHistory
      tags: [kids]
      summary: Get meal history for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Meal history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealDay"

  /kids/{kidId}/notes:
    get:
      operationId: getKidNotes
      tags: [notes]
      summary: Get private notes for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Private notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"

    post:
      operationId: addKidNote
      tags: [notes]
      summary: Add a private note for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteRequest"
      responses:
        "201":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /kids/{kidId}/notes/{noteId}:
    delete:
      operationId: deleteKidNote
      tags: [notes]
      summary: Delete a private note
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Note deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /kids/{kidId}/visibility:
    put:
      operationId: updateFoodVisibility
      tags: [kids]
      summary: Update food/recipe visibility for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisibilityRequest"
      responses:
        "200":
          description: Visibility updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /kids/{kidId}/meal-logs:
    get:
      operationId: getKidMealLogs
      tags: [kids]
      summary: Get per-meal log entries for a kid (optionally filtered by date)
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Meal log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealLog"
    post:
      operationId: addMealLog
      tags: [kids]
      summary: Log a per-meal entry for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMealLogRequest"
      responses:
        "201":
          description: Meal log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealLog"

  /kids/{kidId}/meal-logs/{logId}:
    delete:
      operationId: deleteMealLog
      tags: [kids]
      summary: Delete a meal log entry
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: logId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entry deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /kids/{kidId}/meal-logs/{logId}/image:
    put:
      operationId: updateMealLogImage
      tags: [kids]
      summary: Set or clear the photo image URL for a meal log entry
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: logId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMealLogImageRequest"
      responses:
        "200":
          description: Image URL updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealLog"

  /kids/{kidId}/food-approvals:
    get:
      operationId: getKidFoodApprovals
      tags: [kids]
      summary: Get all food approval records for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of food approval records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodApproval"

  /kids/{kidId}/food-approvals/{foodId}:
    put:
      operationId: upsertKidFoodApproval
      tags: [kids]
      summary: Set or delete a food approval status for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: foodId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FoodApprovalRequest"
      responses:
        "200":
          description: Approval updated or removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary

  /kids/{kidId}/meal-log:
    get:
      operationId: getKidMealLog
      tags: [kids]
      summary: Get per-food meal entries for a kid on a given date, grouped by meal type
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Meal entries grouped by meal type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealLogDetail"

  /kids/{kidId}/ketones:
    get:
      operationId: getKidKetoneReadings
      tags: [kids]
      summary: Get ketone readings for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Ketone readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KetoneReading"
    post:
      operationId: addKetoneReading
      tags: [kids]
      summary: Add a ketone reading
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddKetoneReadingRequest"
      responses:
        "201":
          description: Ketone reading added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KetoneReading"

  /kids/{kidId}/ketones/{readingId}:
    delete:
      operationId: deleteKetoneReading
      tags: [kids]
      summary: Delete a ketone reading
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: readingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reading deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /meal-plans:
    get:
      operationId: getLibraryMealPlans
      tags: [mealplans]
      summary: List all library meal plans (doctor-scoped)
      responses:
        "200":
          description: List of library meal plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibraryMealPlan"
    post:
      operationId: createLibraryMealPlan
      tags: [mealplans]
      summary: Create a new library meal plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLibraryMealPlanRequest"
      responses:
        "201":
          description: Library meal plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryMealPlan"

  /meal-plans/{planId}:
    get:
      operationId: getLibraryMealPlan
      tags: [mealplans]
      summary: Get a library meal plan with its items
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Library meal plan with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryMealPlanDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateLibraryMealPlan
      tags: [mealplans]
      summary: Update a library meal plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLibraryMealPlanRequest"
      responses:
        "200":
          description: Updated library meal plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryMealPlan"
    delete:
      operationId: deleteLibraryMealPlan
      tags: [mealplans]
      summary: Delete a library meal plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plan deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /meal-plans/{planId}/items:
    post:
      operationId: addLibraryMealPlanItem
      tags: [mealplans]
      summary: Add a food item to a library meal plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddLibraryMealPlanItemRequest"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryMealPlanItem"

  /meal-plans/{planId}/items/{itemId}:
    delete:
      operationId: deleteLibraryMealPlanItem
      tags: [mealplans]
      summary: Remove an item from a library meal plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /kids/{kidId}/meal-plan:
    get:
      operationId: getKidAssignedMealPlan
      tags: [mealplans]
      summary: Get the library meal plan assigned to a kid (or null if none)
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assigned meal plan with items (or null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryMealPlanDetail"
        "204":
          description: No plan assigned
    put:
      operationId: assignKidMealPlan
      tags: [mealplans]
      summary: Assign or unassign a library meal plan to a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignMealPlanRequest"
      responses:
        "200":
          description: Assignment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /foods:
    get:
      operationId: getFoods
      tags: [foods]
      summary: Get all foods
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of foods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Food"
    post:
      operationId: createFood
      tags: [foods]
      summary: Create a new food item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFoodRequest"
      responses:
        "201":
          description: Food created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Food"

  /kids/{kidId}/meal-plans:
    get:
      operationId: getKidMealPlans
      tags: [kids]
      summary: Get all meal plans for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of meal plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealPlan"
    post:
      operationId: createKidMealPlan
      tags: [kids]
      summary: Create a new meal plan for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMealPlanRequest"
      responses:
        "201":
          description: Meal plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlan"

  /kids/{kidId}/meal-plans/{planId}:
    get:
      operationId: getKidMealPlan
      tags: [kids]
      summary: Get a single meal plan with its items
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Meal plan with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanDetail"
    put:
      operationId: updateKidMealPlan
      tags: [kids]
      summary: Update a meal plan
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMealPlanRequest"
      responses:
        "200":
          description: Updated meal plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlan"
    delete:
      operationId: deleteKidMealPlan
      tags: [kids]
      summary: Delete a meal plan
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plan deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /kids/{kidId}/meal-plans/{planId}/items:
    post:
      operationId: addMealPlanItem
      tags: [kids]
      summary: Add a food item to a meal plan
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMealPlanItemRequest"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanItem"

  /kids/{kidId}/meal-plans/{planId}/items/{itemId}:
    delete:
      operationId: deleteMealPlanItem
      tags: [kids]
      summary: Remove an item from a meal plan
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: planId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /foods/{foodId}:
    get:
      operationId: getFood
      tags: [foods]
      summary: Get a single food item
      parameters:
        - name: foodId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Food item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Food"
    put:
      operationId: updateFood
      tags: [foods]
      summary: Update a food item
      parameters:
        - name: foodId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFoodRequest"
      responses:
        "200":
          description: Food updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Food"
    delete:
      operationId: deleteFood
      tags: [foods]
      summary: Delete a food item
      parameters:
        - name: foodId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Food deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
